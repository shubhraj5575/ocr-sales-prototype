<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OCR Sales · Demand detail</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" id="content"></div>
  </main>
</div>
<div class="drawer-overlay" id="drawer-overlay"></div>
<script src="assets/data.js"></script><script src="assets/format.js"></script><script src="assets/shell.js"></script>
<script>
  Shell.init({ active: 'demands', crumbs: ['Demands', 'DM-00001'] });
  const d = OCR_DATA.demands[0];
  const b = OCR_DATA.bookings.find(x => x.unit === d.unitNo) || OCR_DATA.bookings[0];

  // Build mock installment schedule (11 installments)
  const installments = [
    { name: 'Booking amount', pct: 10, due: '2024-01-15', amount: 850000, paid: 850000, balance: 0, valid: true },
    { name: 'Within 30 days', pct: 15, due: '2024-02-14', amount: 1275000, paid: 1275000, balance: 0, valid: true },
    { name: 'On allotment', pct: 10, due: '2024-04-30', amount: 850000, paid: 850000, balance: 0, valid: true },
    { name: 'Foundation', pct: 10, due: '2024-08-15', amount: 850000, paid: 850000, balance: 0, valid: true },
    { name: 'Plinth', pct: 10, due: '2024-11-20', amount: 850000, paid: 740000, balance: 110000, valid: true },
    { name: 'Slab 1', pct: 10, due: '2025-02-10', amount: 850000, paid: 0, balance: 850000, valid: true },
    { name: 'Slab 2', pct: 10, due: '2025-05-15', amount: 850000, paid: 0, balance: 850000, valid: false },
    { name: 'Brickwork', pct: 10, due: '2025-08-20', amount: 850000, paid: 0, balance: 850000, valid: false },
    { name: 'Plaster', pct: 5, due: '2025-11-01', amount: 425000, paid: 0, balance: 425000, valid: false },
    { name: 'Possession', pct: 5, due: '2026-02-15', amount: 425000, paid: 0, balance: 425000, valid: false },
    { name: 'Other dues', pct: 5, due: '2026-03-15', amount: 425000, paid: 0, balance: 425000, valid: false },
  ];

  const totalAmount = installments.reduce((s,i)=>s+i.amount,0);
  const totalPaid = installments.reduce((s,i)=>s+i.paid,0);
  const totalBalance = totalAmount - totalPaid;

  document.getElementById('content').innerHTML = `
    <div class="page-head">
      <div class="titles">
        <span class="eyebrow eyebrow-gold">Demand · ${d.id}</span>
        <h1 class="h-page" style="display:flex;align-items:baseline;gap:14px;">
          ${d.customerName} <span class="pill pill-gold pill-lg">Pending</span>
        </h1>
        <p class="desc">Unit <span class="num">${d.unitNo}</span> · ${d.paymentPlan} · Issued ${fmt.date(d.demandDate)}</p>
      </div>
      <div class="row gap-2">
        <button class="btn btn-ghost btn-sm">${svg('download','icon')} Demand PDF</button>
        <button class="btn btn-ghost btn-sm">${svg('mail','icon')} Email allottee</button>
        <button class="btn btn-gold btn-sm">${svg('plus','icon')} Mark cleared</button>
      </div>
    </div>

    <section class="card mb-6">
      <div class="card-pad-lg" style="display:grid;grid-template-columns:repeat(4,1fr);gap:32px;">
        <div>
          <span class="eyebrow">Total payable</span>
          <div class="num-display" style="font-size:2.2rem;margin-top:8px;">${fmt.inr(totalAmount)}</div>
          <span class="text-muted" style="font-size:0.78rem;">Across 11 installments</span>
        </div>
        <div>
          <span class="eyebrow">Already received</span>
          <div class="num-display text-mint" style="font-size:2rem;margin-top:8px;">${fmt.inr(totalPaid, {compact:true})}</div>
          <span class="text-muted" style="font-size:0.78rem;">${Math.round(totalPaid/totalAmount*100)}% of total</span>
        </div>
        <div>
          <span class="eyebrow">Outstanding</span>
          <div class="num-display text-rust" style="font-size:2rem;margin-top:8px;">${fmt.inr(totalBalance, {compact:true})}</div>
          <span class="text-muted" style="font-size:0.78rem;">5 installments due</span>
        </div>
        <div>
          <span class="eyebrow">Interest accrued</span>
          <div class="num-display" style="font-size:2rem;margin-top:8px;color:var(--gold-1);">${fmt.inr(d.interest)}</div>
          <span class="text-muted" style="font-size:0.78rem;">@ 12% p.a.</span>
        </div>
      </div>
    </section>

    <div class="detail-grid">
      <div class="card">
        <div class="card-head"><h3>Installment ledger</h3><span class="text-muted" style="font-size:0.78rem;">${d.paymentPlan}</span></div>
        <div class="table-scroll">
          <table class="data">
            <thead><tr><th>#</th><th>Stage</th><th class="col-num">%</th><th>Due date</th><th class="col-money">Amount</th><th class="col-money">Receipt</th><th class="col-money">Balance</th><th>Status</th></tr></thead>
            <tbody>
              ${installments.map((i, idx) => {
                let pillCls = 'pill-naked';
                let pillText = 'Upcoming';
                if (i.balance === 0) { pillCls = 'pill-mint'; pillText = 'Cleared'; }
                else if (i.paid > 0) { pillCls = 'pill-gold'; pillText = 'Partial'; }
                else if (i.valid) { pillCls = 'pill-rust'; pillText = 'Overdue'; }
                return `<tr style="${i.valid && i.balance > 0 ? 'background:linear-gradient(90deg, rgba(196,83,57,0.04), transparent);' : ''}">
                  <td data-label="#" class="col-id">${idx + 1}</td>
                  <td data-label="Stage">${i.name}</td>
                  <td data-label="%" class="col-num">${i.pct}%</td>
                  <td data-label="Due" class="num text-subtle">${fmt.date(i.due)}</td>
                  <td data-label="Amount" class="col-money">${fmt.inr(i.amount, {compact:true})}</td>
                  <td data-label="Receipt" class="col-money text-mint">${i.paid ? fmt.inr(i.paid, {compact:true}) : '—'}</td>
                  <td data-label="Balance" class="col-money ${i.balance ? 'text-rust' : 'text-muted'}">${i.balance ? fmt.inr(i.balance, {compact:true}) : '—'}</td>
                  <td data-label="Status"><span class="pill ${pillCls}">${pillText}</span></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <aside class="detail-stack">
        <div class="card card-pad-lg">
          <span class="eyebrow eyebrow-gold">Allottee</span>
          <div class="row gap-3 mt-3">
            <span class="av av-lg">${fmt.initials(d.customerName)}</span>
            <div class="col gap-1">
              <span style="font-weight:500;">${d.customerName}</span>
              <span class="text-muted num" style="font-size:0.84rem;">${(OCR_DATA.customers[0] && OCR_DATA.customers[0].phone) || '—'}</span>
            </div>
          </div>
          <a class="btn btn-ghost btn-sm mt-4" href="customer-detail.html" style="width:100%;justify-content:center;">Open allottee profile</a>
        </div>

        <div class="card card-pad-lg" style="background: var(--ink-1); color: var(--ink-text);">
          <span class="eyebrow" style="color: var(--ink-text-3);">Demand letter status</span>
          <h3 class="h-section mt-2" style="color: var(--paper-1);">Sent on ${fmt.date(d.demandDate)}</h3>
          <p style="color: var(--ink-text-2); font-size: 0.86rem; margin-top: 8px;">PDF dispatched via email and registered post. Read receipt: open · 28 Apr 2026 09:14.</p>
          <div class="col gap-2 mt-4">
            <button class="btn" style="background:var(--ink-3);color:var(--paper-1);width:100%;justify-content:center;">${svg('download','icon')} Re-download letter</button>
          </div>
        </div>

        <div class="card card-pad-lg">
          <span class="eyebrow">Reminders</span>
          <div class="col gap-2 mt-3">
            <div class="row between" style="padding:6px 0;border-bottom:1px dashed var(--border-1);"><span style="font-size:0.86rem;">SMS · 5 days overdue</span><span class="pill pill-mint">Sent</span></div>
            <div class="row between" style="padding:6px 0;border-bottom:1px dashed var(--border-1);"><span style="font-size:0.86rem;">Email · 10 days</span><span class="pill pill-mint">Sent</span></div>
            <div class="row between" style="padding:6px 0;"><span style="font-size:0.86rem;">Call · 15 days</span><span class="pill pill-gold">Scheduled</span></div>
          </div>
        </div>
      </aside>
    </div>
  `;
</script>
</body></html>
