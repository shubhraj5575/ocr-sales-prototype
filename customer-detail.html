<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OCR Sales · Allottee detail</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" id="content"></div>
  </main>
</div>

<div class="drawer-overlay" id="drawer-overlay"></div>

<script src="assets/data.js"></script>
<script src="assets/format.js"></script>
<script src="assets/shell.js"></script>
<script>
  Shell.init({ active: 'customers', crumbs: ['Allottees', 'Profile'] });

  const c = OCR_DATA.customers.find(x => x.isJoint) || OCR_DATA.customers[0];
  const linkedBookings = OCR_DATA.bookings.filter(b => b.unit === c.unit).slice(0, 3);
  const linkedReceipts = OCR_DATA.receipts.filter(r => r.unitId === c.unit).slice(0, 5);

  document.getElementById('content').innerHTML = `
    <div class="page-head">
      <div class="titles">
        <span class="eyebrow eyebrow-gold">Allottee · ${c.id}</span>
        <h1 class="h-page">${c.title} ${c.name}</h1>
        <p class="desc">Unit <span class="num">${c.unit}</span> · ${c.isJoint ? 'Joint booking' : 'Single allottee'} · KYC complete</p>
      </div>
      <div class="row gap-2">
        <button class="btn btn-ghost btn-sm">${svg('phone','icon')} Call</button>
        <button class="btn btn-ghost btn-sm">${svg('mail','icon')} Email</button>
        <button class="btn btn-gold btn-sm">${svg('edit','icon')} Edit profile</button>
      </div>
    </div>

    <div class="detail-grid">
      <div class="detail-stack">

        <!-- Primary allottee -->
        <div class="card">
          <div class="card-head">
            <h3>Primary allottee</h3>
            <span class="pill pill-mint">KYC verified</span>
          </div>
          <div class="card-pad-lg">
            <div class="row gap-4 mb-6">
              <span class="av av-xl">${fmt.initials(c.name)}</span>
              <div class="col gap-2">
                <h3 class="h-section">${c.title} ${c.name}</h3>
                <div class="row gap-3 text-muted" style="font-size:0.86rem;flex-wrap:wrap;">
                  <span class="row gap-2">${svg('phone','icon')} <span class="num">${c.phone}</span></span>
                  <span class="row gap-2">${svg('mail','icon')} ${c.email}</span>
                </div>
                <div class="row gap-2 text-muted" style="font-size:0.86rem;">
                  ${svg('mappin','icon')} <span>${c.address}</span>
                </div>
              </div>
            </div>
            <div class="attr-list">
              <div class="attr"><span class="k">Date of birth</span><span class="v num">${c.dob}</span></div>
              <div class="attr"><span class="k">Aadhaar no.</span><span class="v num">${c.aadharNo}</span></div>
              <div class="attr"><span class="k">PAN no.</span><span class="v num">${c.panNo}</span></div>
              <div class="attr"><span class="k">Relation</span><span class="v">${c.relation} ${c.relationName}</span></div>
            </div>
            <div class="row gap-3 mt-6">
              <div class="card" style="flex:1;padding:14px;text-align:center;background:var(--paper-1);">
                <span class="eyebrow">ID Photo</span>
                <div style="height:72px;border:1px dashed var(--border-2);border-radius:6px;margin-top:8px;display:grid;place-items:center;color:var(--text-3);font-size:0.74rem;">aadhaar-${c.id}.pdf</div>
              </div>
              <div class="card" style="flex:1;padding:14px;text-align:center;background:var(--paper-1);">
                <span class="eyebrow">PAN Photo</span>
                <div style="height:72px;border:1px dashed var(--border-2);border-radius:6px;margin-top:8px;display:grid;place-items:center;color:var(--text-3);font-size:0.74rem;">pan-${c.id}.pdf</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Joint allottees -->
        ${c.isJoint ? `
        <div class="card">
          <div class="card-head">
            <h3>Joint allottee</h3>
            <span class="pill pill-gold">Joint booking</span>
          </div>
          <div class="card-pad-lg">
            <div class="row gap-4 mb-4">
              <span class="av av-lg">${fmt.initials(c.name2)}</span>
              <div class="col gap-1">
                <span class="eyebrow">Allottee 2</span>
                <h3 class="h-section">${c.name2}</h3>
                <span class="text-muted num" style="font-size:0.86rem;">${c.phone2}</span>
              </div>
            </div>
            <div class="attr-list">
              <div class="attr"><span class="k">Aadhaar</span><span class="v num">${c.aadharNo2 || '—'}</span></div>
              <div class="attr"><span class="k">PAN</span><span class="v num">${c.panNo2 || '—'}</span></div>
            </div>
          </div>
        </div>
        ` : ''}

        <!-- Bookings -->
        <div class="card">
          <div class="card-head">
            <h3>Bookings</h3>
            <a class="text-gold" style="font-size:0.82rem;" href="bookings.html">All bookings →</a>
          </div>
          <div class="table-scroll">
            <table class="data">
              <thead><tr><th>Booking</th><th>Unit</th><th>Date</th><th class="col-money">Cost</th><th>Status</th></tr></thead>
              <tbody>
                ${linkedBookings.map(b => `
                  <tr onclick="window.location='booking-detail.html'" style="cursor:pointer;">
                    <td data-label="Booking" class="col-id">${fmt.shortId(b.id)}</td>
                    <td data-label="Unit"><span class="num">${b.block} · ${b.unit}</span></td>
                    <td data-label="Date" class="num text-subtle">${fmt.date(b.bookingDate)}</td>
                    <td data-label="Cost" class="col-money">${fmt.inr(b.totalUnitCost, {compact:true})}</td>
                    <td data-label="Status">${fmt.pillFor('status', b.status)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <!-- Receipts -->
        <div class="card">
          <div class="card-head">
            <h3>Receipts</h3>
            <a class="text-gold" style="font-size:0.82rem;" href="receipts.html">All receipts →</a>
          </div>
          <div class="table-scroll">
            <table class="data">
              <thead><tr><th>Receipt</th><th>Date</th><th>Mode</th><th class="col-money">Amount</th><th>Status</th></tr></thead>
              <tbody>
                ${linkedReceipts.map(r => `
                  <tr><td data-label="Receipt" class="col-id">${r.receiptNo}</td><td data-label="Date" class="num text-subtle">${fmt.date(r.date)}</td><td data-label="Mode">${r.mode}</td><td data-label="Amount" class="col-money">${fmt.inr(r.amount,{compact:true})}</td><td data-label="Status">${fmt.pillFor('status', r.status)}</td></tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <aside class="detail-stack">
        <div class="card card-pad-lg" style="background:var(--ink-1);color:var(--ink-text);">
          <span class="eyebrow" style="color:var(--ink-text-3);">Lifetime value</span>
          <div class="num-display" style="font-size:2.4rem;color:var(--paper-1);margin-top:8px;">₹2.84 Cr</div>
          <div style="margin-top:14px;height:6px;border-radius:999px;background:rgba(255,255,255,0.08);overflow:hidden;">
            <div style="width:62%;height:100%;background:linear-gradient(90deg,var(--gold-2),var(--gold-3));"></div>
          </div>
          <div class="row between mt-2">
            <span class="num" style="font-size:0.78rem;color:var(--gold-2);">62% paid</span>
            <span class="num" style="font-size:0.78rem;color:var(--ink-text-3);">₹1.78 Cr remaining</span>
          </div>
        </div>

        <div class="card card-pad-lg">
          <span class="eyebrow">Quick stats</span>
          <div class="col gap-3 mt-3">
            <div class="row between"><span class="text-subtle" style="font-size:0.86rem;">Total bookings</span><span class="num">${linkedBookings.length}</span></div>
            <div class="row between"><span class="text-subtle" style="font-size:0.86rem;">Receipts cleared</span><span class="num text-mint">${linkedReceipts.length}</span></div>
            <div class="row between"><span class="text-subtle" style="font-size:0.86rem;">Pending demands</span><span class="num text-gold">2</span></div>
            <div class="row between"><span class="text-subtle" style="font-size:0.86rem;">Documents on file</span><span class="num">7</span></div>
          </div>
        </div>

        <div class="card card-pad-lg">
          <span class="eyebrow">Related links</span>
          <div class="col gap-2 mt-3" style="font-size:0.88rem;">
            <a href="documents.html" class="row gap-2" style="padding:8px 0;border-bottom:1px dashed var(--border-1);">${svg('file-stack','icon')} Documents made <span class="num text-muted" style="margin-left:auto;font-size:0.78rem;">7</span></a>
            <a href="demands.html" class="row gap-2" style="padding:8px 0;border-bottom:1px dashed var(--border-1);">${svg('send','icon')} Demands sent <span class="num text-muted" style="margin-left:auto;font-size:0.78rem;">5</span></a>
            <a href="site-visits.html" class="row gap-2" style="padding:8px 0;">${svg('calendar-check','icon')} Site visits <span class="num text-muted" style="margin-left:auto;font-size:0.78rem;">2</span></a>
          </div>
        </div>
      </aside>
    </div>
  `;
</script>
</body>
</html>
